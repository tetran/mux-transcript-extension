<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laravel Learn Mux Subtitle - オプション</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      max-width: 480px;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input[type="password"],
    input[type="range"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .field {
      margin-bottom: 16px;
    }
    .char-count {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #6b7280;
    }
    button {
      margin-top: 12px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #2563eb;
    }
    #status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #16a34a;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>DeepL 翻訳設定</h1>
  <div class="field">
    <label for="apiKey">DeepL Free API キー</label>
    <input type="password" id="apiKey" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:fx" />
  </div>
  <div class="field">
    <label for="formality">ていねいさ</label>
    <select id="formality">
      <option value="prefer_more">ていねい</option>
      <option value="default">ふつう</option>
      <option value="prefer_less">カジュアル</option>
    </select>
  </div>
  <div class="field">
    <label for="minDisplaySeconds">字幕の最小表示時間</label>
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="range" id="minDisplaySeconds" min="0" max="5" step="0.5" style="flex:1" />
      <span id="minDisplayValue">2.0 秒</span>
    </div>
  </div>
  <div class="field">
    <label for="customInstructions">話し方（任意）</label>
    <textarea id="customInstructions" maxlength="300"
      placeholder="例: できるだけ簡潔に翻訳してください"></textarea>
    <p id="charCount" class="char-count">0 / 300</p>
  </div>
  <button id="save">保存</button>
  <p id="status"></p>
  <script src="src/options.js"></script>
</body>
</html>
